<script>
/* ============================================================
   Hawaiʻi Housing Affordability Tracker — Census API Updater
   Paste this entire block into a Squarespace Code Block on the
   same page as the tracker. It will auto-refresh income and
   rent figures from the U.S. Census Bureau ACS every 30 days.

   SETUP:
   1. Get a free API key at: https://api.census.gov/key_signup.html
   2. Replace YOUR_FREE_API_KEY below with your key
   3. Update ACS_YEAR when the Census releases a newer vintage
      (ACS 5-year releases annually ~December; 2023 = current)
   ============================================================ */
(function () {

  // ─── CONFIGURATION ──────────────────────────────────────────
  const CENSUS_KEY   = 'YOUR_FREE_API_KEY';
  const ACS_YEAR     = '2023';
  const RATE_DEFAULT = 6.38;               // % — fallback if slider not found
  const CACHE_KEY    = 'hi_housing_census_data';
  const CACHE_TS_KEY = 'hi_housing_census_ts';
  const CACHE_TTL    = 30 * 24 * 60 * 60 * 1000; // 30 days in ms
  // ─────────────────────────────────────────────────────────────

  // Census county name → countyData key
  // Note: countyData uses 'Hawaii' and 'Kauai' as keys (no ʻokina)
  const NAME_MAP = {
    'Honolulu County, Hawaii': 'Honolulu',
    'Hawaii County, Hawaii':   'Hawaii',
    'Maui County, Hawaii':     'Maui',
    'Kauai County, Hawaii':    'Kauai',
  };

  // Monthly P&I payment: price × 80% LTV, 30-year fixed
  function monthlyPayment(price, annualRatePct) {
    const r    = annualRatePct / 100 / 12;
    const loan = price * 0.80;
    if (r === 0) return loan / 360;
    return loan * r / (1 - Math.pow(1 + r, -360));
  }

  // Recalculate all derived fields after Census updates income/rent.
  // Home prices (sfhPrice, condoPrice) and askRent stay hardcoded —
  // those come from Hawaiʻi Board of Realtors, not Census.
  function recalcDerived(county, income, rent, ratePct) {
    /* eslint-disable no-undef */
    const d       = countyData[county];  // const in script tag — not on window
    const sfhM    = monthlyPayment(d.sfhPrice, ratePct);
    const condoM  = monthlyPayment(d.condoPrice, ratePct);
    const sfhPTI  = sfhM  / (income / 12);
    const condoPTI= condoM / (income / 12);
    const qualSFH  = sfhM  * 40;   // income needed at 30%-of-gross threshold
    const qualCondo= condoM * 40;
    return {
      income,
      rent,
      sfhMortgage:   Math.round(sfhM),
      condoMortgage: Math.round(condoM),
      sfhPTI:        parseFloat(sfhPTI.toFixed(4)),
      condoPTI:      parseFloat(condoPTI.toFixed(4)),
      sfhIdx:        parseFloat((income / qualSFH   * 100).toFixed(1)),
      condoIdx:      parseFloat((income / qualCondo * 100).toFixed(1)),
      sfhGap:        Math.max(0, Math.round(qualSFH   - income)),
      condoGap:      Math.max(0, Math.round(qualCondo - income)),
    };
  }

  // Fetch ACS 5-year estimates for Hawaii state + 4 counties
  async function fetchCensus() {
    const base = `https://api.census.gov/data/${ACS_YEAR}/acs/acs5`;
    const vars  = 'B19013_001E,B25064_001E';  // median income + median gross rent
    const apiKey= CENSUS_KEY !== 'YOUR_FREE_API_KEY' ? `&key=${CENSUS_KEY}` : '';

    const [stateRes, countyRes] = await Promise.all([
      fetch(`${base}?get=${vars}&for=state:15${apiKey}`),
      fetch(`${base}?get=${vars},NAME&for=county:*&in=state:15${apiKey}`),
    ]);

    if (!stateRes.ok || !countyRes.ok) {
      throw new Error(`Census API error — state: ${stateRes.status}, county: ${countyRes.status}`);
    }

    const stateRows  = await stateRes.json();
    const countyRows = await countyRes.json();
    const result     = {};

    // State (row 0 = headers, row 1 = Hawaii statewide)
    const [sHdr, sRow] = stateRows;
    result['State'] = {
      income: parseInt(sRow[sHdr.indexOf('B19013_001E')]),
      rent:   parseInt(sRow[sHdr.indexOf('B25064_001E')]),
    };

    // Counties
    const [cHdr, ...cRows] = countyRows;
    const nameIdx   = cHdr.indexOf('NAME');
    const incomeIdx = cHdr.indexOf('B19013_001E');
    const rentIdx   = cHdr.indexOf('B25064_001E');

    for (const row of cRows) {
      const key = NAME_MAP[row[nameIdx]];
      if (!key) continue;
      result[key] = {
        income: parseInt(row[incomeIdx]),
        rent:   parseInt(row[rentIdx]),
      };
    }

    return result;
  }

  // Patch countyData in-place and re-render the tracker.
  // The tracker uses `const countyData` / `let currentCounty` / `function selectCounty`
  // — declared with const/let/function in a script tag, so NOT on window in modern browsers.
  // We access them via eval-scope by wrapping in a script tag injected into the same document.
  function applyUpdates(censusData) {
    /* eslint-disable no-undef */
    if (typeof countyData === 'undefined') {
      console.warn('[Census Updater] countyData not found — is the tracker on this page?');
      return;
    }

    // Read current mortgage rate from slider if tracker is on the same page
    const rateEl = document.getElementById('rate-slider');
    const rate   = rateEl ? parseFloat(rateEl.value) : RATE_DEFAULT;

    for (const [county, vals] of Object.entries(censusData)) {
      if (!countyData[county]) continue;
      const derived = recalcDerived(county, vals.income, vals.rent, rate);
      Object.assign(countyData[county], derived);
    }

    // Re-render using current county selection
    if (typeof selectCounty === 'function') {
      selectCounty(typeof currentCounty !== 'undefined' ? currentCounty : 'State');
    }

    console.log(`[Census Updater] Applied ACS ${ACS_YEAR} data to countyData`);
  }

  // Entry point: check 30-day cache, fetch fresh if stale
  async function run() {
    try {
      const now = Date.now();
      const ts  = parseInt(localStorage.getItem(CACHE_TS_KEY) || '0');
      const raw = localStorage.getItem(CACHE_KEY);

      if (raw && (now - ts) < CACHE_TTL) {
        const agedays = Math.round((now - ts) / 86400000);
        console.log(`[Census Updater] Cache hit (${agedays}d old) — next refresh in ${30 - agedays}d`);
        applyUpdates(JSON.parse(raw));
        return;
      }

      console.log('[Census Updater] Cache stale or empty — fetching from Census ACS...');
      const data = await fetchCensus();
      localStorage.setItem(CACHE_KEY, JSON.stringify(data));
      localStorage.setItem(CACHE_TS_KEY, String(now));
      applyUpdates(data);
      console.log('[Census Updater] Fetched, cached, and applied fresh ACS data');

    } catch (err) {
      console.error('[Census Updater]', err.message);
      // Silently fail — tracker continues with hardcoded fallback values
    }
  }

  // Fire after the tracker's inline selectCounty('State') has already run
  window.addEventListener('load', run);

})();
</script>
