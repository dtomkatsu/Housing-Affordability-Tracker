name: Monthly Data Update

on:
  schedule:
    # 10:00 UTC on day 22 of every month (midnight HST).
    # Redfin publishes on the 3rd Friday (day 15-21 inclusive); day 22 is
    # always ≥ 1 day after release so the S3 bucket has the just-published
    # prior-month data. All other sources captured at day-22 state:
    #   - AAA gas: daily snapshot (always current)
    #   - BLS Honolulu CPI: bimonthly, ~15th release — day 22 catches it
    #   - USDA TFP: ~15th release — day 22 catches it, otherwise projected
    - cron: '0 10 22 * *'

  # Manual trigger from GitHub Actions UI (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push updated files
    env:
      BLS_API_KEY: ${{ secrets.BLS_API_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 1. Grocery pipeline: CPI-adjusts baseline prices → regenerates CSVs
      #    under pipelines/grocery/data/output/.
      - name: Run grocery pipeline (CPI-adjust baseline)
        run: python pipelines/grocery/scripts/update_prices.py

      # 2. Patchers — read data sources and update both HTML files.
      - name: Patch Redfin housing prices
        run: python redfin-price-updater.py

      - name: Patch grocery prices
        run: python grocery-price-updater.py

      - name: Patch gas prices
        run: python gas-price-updater.py

      - name: Patch BLS Honolulu CPI (inflation chip + card badges)
        run: python bls-cpi-updater.py

      # USDA Thrifty Food Plan anchors the groceries headline for the
      # reference family of 4. Failures fall back to a null tfpData block
      # (dashboard uses the priced basket) so a CNPP URL hiccup never fails CI.
      - name: Patch USDA Thrifty Food Plan (groceries headline)
        run: python tfp-updater.py
        continue-on-error: true

      # Guard: both HTML files must stay byte-identical — each updater patches
      # both. A divergence here means one patcher or a manual edit missed a file.
      - name: Verify HTML mirror is in sync (index.html == squarespace-single-file.html)
        run: |
          diff index.html squarespace-single-file.html \
            && echo "HTML files are in sync ✓" \
            || { echo "ERROR: index.html and squarespace-single-file.html have diverged!"; exit 1; }

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add squarespace-single-file.html index.html
          git add data/gas_prices_history.csv 2>/dev/null || true
          git add pipelines/grocery/data/output pipelines/grocery/data/cpi_cache 2>/dev/null || true
          git diff --staged --quiet \
            && echo "No changes — data already up to date." \
            || git commit -m "chore: monthly data update $(date +'%Y-%m')"
          git push
