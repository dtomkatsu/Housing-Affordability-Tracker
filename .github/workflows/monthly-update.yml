name: Monthly Data Update

on:
  schedule:
    # Runs at 9:00 AM UTC on the 1st of every month
    # Redfin releases new data on the 3rd Friday — running on the 1st catches
    # the prior month's data; adjust to '0 9 15 * *' to run mid-month instead.
    - cron: '0 9 1 * *'

  # Allows manual trigger from the GitHub Actions UI (Actions tab → Run workflow)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit and push the updated HTML

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run price updater
        run: python redfin-price-updater.py

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add squarespace-single-file.html
          # Only commit if the file actually changed; exit 0 either way
          git diff --staged --quiet \
            && echo "No changes — data already up to date." \
            || git commit -m "chore: monthly data update $(date +'%Y-%m')"
          git push
